<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Tareas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>Gestor de Tareas</h1>
      <p class="subtitle">Administra tus tareas con filtros, ordenamiento y CRUD completo</p>
    </div>
  </header>

  <main class="container">
    <div id="alert" class="alert hidden" role="alert"></div>

    <section class="card">
      <h2 id="form-title">Nueva tarea</h2>
      <form id="task-form" novalidate>
        <input type="hidden" id="task-id">

        <div class="form-grid">
          <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre" required maxlength="200" placeholder="Ej: Revisar documentación">
          </div>

          <div class="form-group">
            <label for="responsable">Responsable</label>
            <input type="text" id="responsable" name="responsable" maxlength="120" placeholder="Ej: Ana García">
          </div>

          <div class="form-group">
            <label for="estado">Estado</label>
            <select id="estado" name="estado">
              <option value="pendiente">Pendiente</option>
              <option value="en progreso">En progreso</option>
              <option value="finalizada">Finalizada</option>
            </select>
          </div>

          <div class="form-group">
            <label for="fecha_creacion">Fecha de creación</label>
            <input type="date" id="fecha_creacion" name="fecha_creacion">
          </div>

          <div class="form-group">
            <label for="fecha_vencimiento">Fecha de vencimiento *</label>
            <input type="date" id="fecha_vencimiento" name="fecha_vencimiento" required>
          </div>
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" name="descripcion" rows="3" maxlength="2000" placeholder="Detalles de la tarea..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Crear tarea</button>
          <button type="button" class="btn btn-secondary hidden" id="cancel-edit-btn">Cancelar edición</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Listado de tareas</h2>
        <button type="button" class="btn btn-secondary" id="refresh-btn">Actualizar</button>
      </div>

      <form id="filters-form" class="filters">
        <div class="form-grid">
          <div class="form-group">
            <label for="filter-responsable">Responsable</label>
            <input type="text" id="filter-responsable" placeholder="Filtrar por responsable">
          </div>

          <div class="form-group">
            <label for="filter-estado">Estado</label>
            <select id="filter-estado">
              <option value="">Todos</option>
              <option value="pendiente">Pendiente</option>
              <option value="en progreso">En progreso</option>
              <option value="finalizada">Finalizada</option>
            </select>
          </div>

          <div class="form-group">
            <label for="filter-creacion-desde">Creación desde</label>
            <input type="date" id="filter-creacion-desde">
          </div>

          <div class="form-group">
            <label for="filter-creacion-hasta">Creación hasta</label>
            <input type="date" id="filter-creacion-hasta">
          </div>

          <div class="form-group">
            <label for="filter-vencimiento-desde">Vencimiento desde</label>
            <input type="date" id="filter-vencimiento-desde">
          </div>

          <div class="form-group">
            <label for="filter-vencimiento-hasta">Vencimiento hasta</label>
            <input type="date" id="filter-vencimiento-hasta">
          </div>

          <div class="form-group">
            <label for="sort-by">Ordenar por</label>
            <select id="sort-by">
              <option value="fecha_creacion">Fecha de creación</option>
              <option value="fecha_vencimiento">Fecha de vencimiento</option>
              <option value="nombre">Nombre</option>
            </select>
          </div>

          <div class="form-group">
            <label for="sort-order">Orden</label>
            <select id="sort-order">
              <option value="desc">Descendente</option>
              <option value="asc">Ascendente</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Aplicar filtros</button>
          <button type="button" class="btn btn-secondary" id="clear-filters-btn">Limpiar filtros</button>
        </div>
      </form>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Responsable</th>
              <th>Estado</th>
              <th>Creación</th>
              <th>Vencimiento</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tasks-table-body">
            <tr>
              <td colspan="7" class="empty-state">Cargando tareas...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>API: <span id="api-url-label"></span></p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
