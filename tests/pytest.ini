[pytest]
minversion = 8.0
testpaths = unit integration e2e
pythonpath = ../backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers -v --tb=short
markers =
    unit: Pruebas unitarias de lógica y validaciones
    integration: Pruebas de integración de la API REST
    e2e: Pruebas end-to-end de interfaz con Playwright
